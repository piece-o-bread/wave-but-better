<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Shooter Debug</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  #overlay {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    color:white; text-align:center;
    background: rgba(0,0,0,0.5);
    padding:12px 18px; border-radius:8px;
    cursor:pointer;
    font-family: Arial, sans-serif;
    user-select:none;
    z-index: 10;
  }
  #crosshair {
    position:absolute; top:50%; left:50%;
    width:20px; height:20px; transform:translate(-50%,-50%);
    z-index: 9;
    pointer-events:none;
  }
  #crosshair:before, #crosshair:after {
    content:""; position:absolute; left:50%; top:50%;
    background:white; transform:translate(-50%,-50%);
  }
  #crosshair:before { width:2px; height:14px; }
  #crosshair:after  { width:14px; height:2px; }
  #scoreUI {
    position:absolute; top:10px; right:10px; color:white; font-size:20px;
    font-family: Arial, sans-serif;
    z-index: 9;
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="overlay">Loading zombie model...</div>
<div id="crosshair" style="display:none"></div>
<div id="scoreUI">Score: 0 | Wave: 1</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
/* ---------- SOUND ---------- */
const deathSound = new Audio("death.mp3");
deathSound.volume = 0.5;

/* ---------- SCENE ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

/* ---------- LIGHTING ---------- */
const ambient = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(50, 100, 50);
scene.add(sun);

/* ---------- GROUND ---------- */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

/* ---------- PLAYER ---------- */
const player = new THREE.Object3D();
player.position.set(0, 1.7, 0);
scene.add(player);
player.add(camera);

let pitch = 0;
let yaw = 0;
let canMove = false;
let gameOver = false;
let keys = {};
let speed = 20;

/* Jump */
let velocityY = 0;
const GRAVITY = -40;
const JUMP_FORCE = 15;
let isOnGround = true;

const PLAYER_HEIGHT = 1.7;
const PLAYER_SIZE = 0.8;
const playerBox = new THREE.Box3();

/* Input */
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

/* Pointer lock */
const overlay = document.getElementById("overlay");
const crosshair = document.getElementById("crosshair");

overlay.addEventListener("click", () => {
  document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
  const locked = document.pointerLockElement === document.body;
  canMove = locked;
  overlay.style.display = locked ? "none" : "block";
  crosshair.style.display = locked ? "block" : "none";
  if (!locked && !gameOver) {
    overlay.textContent = "Click to play WASD/Arrow to move, Space to jump, mouse to look :)";
  }
});

/* Mouse look */
document.addEventListener("mousemove", e => {
  if(!canMove) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  const limit = Math.PI/2 - 0.02;
  pitch = Math.max(-limit, Math.min(limit, pitch));
  player.rotation.y = yaw;
  camera.rotation.x = pitch;
});

/* ---------- GUN ---------- */
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.1,0.6),
  new THREE.MeshStandardMaterial({color:0x555555})
);
gun.position.set(0.3,-0.25,-0.6);
camera.add(gun);

/* ---------- ZOMBIE MODEL ---------- */
let zombieTemplate = null;
let gameReady = false;
const loader = new THREE.GLTFLoader();

loader.load(
  "zombie.glb",
  gltf => {
    zombieTemplate = gltf.scene;

    zombieTemplate.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = true;
      }
    });

    overlay.textContent = "Click to play WASD/Arrow to move, Space to jump, mouse to look :)";
    gameReady = true;
    spawnWave();
  },
  undefined,
  err => {
    console.error("Failed to load zombie.glb:", err);
    overlay.textContent = "Could not load zombie.glb. Check the filename and path.";
  }
);

/* ---------- ENEMIES ---------- */
const enemies = [];
let score = 0;
let wave = 1;
const tempVec = new THREE.Vector3();

function makeZombieInstance() {
  const model = zombieTemplate.clone(true);

  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  box.getSize(size);

  const groundOffset = -box.min.y;
  model.position.y += groundOffset;

  const radius = Math.max(size.x, size.z) * 0.45;

  return { model, radius };
}

function spawnEnemy(){
  if (!zombieTemplate) return;

  const { model, radius } = makeZombieInstance();

  const angle = Math.random() * Math.PI * 2;
  const distance = 10 + Math.random() * 10;

  model.position.x = player.position.x + Math.cos(angle) * distance;
  model.position.z = player.position.z + Math.sin(angle) * distance;

  scene.add(model);

  enemies.push({
    mesh: model,
    box: new THREE.Box3().setFromObject(model),
    health: 5,
    speed: 8 + wave * 0.5,
    radius: radius
  });
}

function spawnWave(){
  if (!zombieTemplate) return;
  for(let i = 0; i < wave * 3; i++){
    spawnEnemy();
  }
}

/* ---------- BULLETS ---------- */
const bullets = [];

class Bullet {
  constructor(pos,dir){
    this.mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.1,8,8),
      new THREE.MeshBasicMaterial({color:0xffff00})
    );
    this.mesh.position.copy(pos);
    scene.add(this.mesh);
    this.dir = dir.clone().normalize();
    this.speed = 50;
    this.alive = true;
  }

  update(delta){
    if(!this.alive) return;

    this.mesh.position.addScaledVector(this.dir,this.speed*delta);

    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      e.box.setFromObject(e.mesh).expandByScalar(0.15);

      if(e.box.containsPoint(this.mesh.position)){
        e.health--;
        if(e.health<=0){
          try {
            deathSound.currentTime = 0;
            deathSound.play();
          } catch {}
          scene.remove(e.mesh);
          enemies.splice(i,1);
          score += 100;
        }
        scene.remove(this.mesh);
        this.alive = false;
        return;
      }
    }

    if(this.mesh.position.distanceTo(player.position) > 150){
      scene.remove(this.mesh);
      this.alive = false;
    }
  }
}

window.addEventListener("mousedown",()=>{
  if(!canMove || !gameReady || gameOver) return;
  const pos = new THREE.Vector3();
  gun.getWorldPosition(pos);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  bullets.push(new Bullet(pos,dir));
});

/* ---------- UPDATE ---------- */
function update(delta){
  if(!canMove || gameOver) return;

  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion).normalize();
  const right = new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

  const move = new THREE.Vector3();
  if(keys["w"]||keys["ArrowUp"]) move.add(forward);
  if(keys["s"]||keys["ArrowDown"]) move.add(forward.clone().negate());
  if(keys["a"]||keys["ArrowLeft"]) move.add(right.clone().negate());
  if(keys["d"]||keys["ArrowRight"]) move.add(right);

  if(move.lengthSq()>0){
    move.normalize().multiplyScalar(speed*delta);
    player.position.add(move);
  }

  if(isOnGround && keys[" "]){
    velocityY = JUMP_FORCE;
    isOnGround = false;
  }

  velocityY += GRAVITY * delta;
  player.position.y += velocityY * delta;

  if(player.position.y <= PLAYER_HEIGHT){
    player.position.y = PLAYER_HEIGHT;
    velocityY = 0;
    isOnGround = true;
  }

  playerBox.set(
    new THREE.Vector3(
      player.position.x - PLAYER_SIZE,
      player.position.y,
      player.position.z - PLAYER_SIZE
    ),
    new THREE.Vector3(
      player.position.x + PLAYER_SIZE,
      player.position.y + PLAYER_HEIGHT,
      player.position.z + PLAYER_SIZE
    )
  );

  for(const e of enemies){
    const dir = player.position.clone().sub(e.mesh.position);
    dir.y = 0;
    const dist = dir.length();

    if(dist > 0.001){
      dir.normalize();
      e.mesh.position.addScaledVector(dir, e.speed * delta);
    }
  }

  for(let i = 0; i < enemies.length; i++){
    for(let j = i + 1; j < enemies.length; j++){
      const a = enemies[i];
      const b = enemies[j];

      const deltaPos = a.mesh.position.clone().sub(b.mesh.position);
      deltaPos.y = 0;
      const dist = deltaPos.length();
      const minDist = a.radius + b.radius;

      if(dist > 0 && dist < minDist){
        const push = (minDist - dist) * 0.5;
        deltaPos.normalize();
        a.mesh.position.addScaledVector(deltaPos, push);
        b.mesh.position.addScaledVector(deltaPos, -push);
      }
    }
  }

  for(const e of enemies){
    e.mesh.lookAt(player.position.x, e.mesh.position.y, player.position.z);
    e.mesh.rotateY(Math.PI);  // flip this if your model faces the wrong way
    e.box.setFromObject(e.mesh).expandByScalar(0.1);

    if(playerBox.intersectsBox(e.box)){
      gameOver = true;
      alert("Game Over :(  Score: " + score);
      location.reload();
    }
  }

  if(gameReady && enemies.length === 0 && !gameOver){
    wave++;
    spawnWave();
  }
}

/* ---------- ANIMATE ---------- */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  for(let i = bullets.length - 1; i >= 0; i--){
    bullets[i].update(delta);
    if(!bullets[i].alive) bullets.splice(i,1);
  }

  update(delta);
  document.getElementById("scoreUI").innerText = "Score: " + score + " | Wave: " + wave;
  renderer.render(scene,camera);
}
animate();

/* ---------- RESIZE ---------- */
window.addEventListener("resize",()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
